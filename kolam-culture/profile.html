<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolam Culture - Profil Bearbeiten</title>
    <style>
        :root {
            --primary: #e83e8c;
            --secondary: #6c757d;
            --light: #f8f9fa;
            --dark: #343a40;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --purple: #6f42c1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }

        header {
            padding: 15px;
            background-color: white;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .logo-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 10px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .header-icons {
            display: flex;
            gap: 15px;
        }

        .header-icon {
            font-size: 20px;
            color: var(--secondary);
            cursor: pointer;
        }

        .header-icon.active {
            color: var(--purple);
        }

        .header-icon.messages {
            color: var(--secondary);
        }

        .header-icon.likes {
            color: var(--primary);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }

        .tab {
            padding: 15px 0;
            flex: 1;
            text-align: center;
            cursor: pointer;
            color: var(--secondary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
        }

        .form-container {
            padding: 20px;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: #444;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .col {
            flex: 1;
        }

        .tag-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .tag {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
            cursor: pointer;
        }

        .tag-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            font-size: 24px;
            color: white;
        }

        .tag-hindu {
            background-color: #6f42c1;
        }

        .tag-berater {
            background-color: #343a40;
        }

        .tag-kaste {
            background-color: #dc3545;
        }

        .tag-kinder {
            background-color: #17a2b8;
        }

        .tag-label {
            font-size: 14px;
            color: #555;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .checkbox-group input {
            margin-right: 10px;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
        }

        .radio-option input {
            margin-right: 5px;
        }

        .tag-importance button {
            flex: 1;
            padding: 5px 10px;
            border: 1px solid #ddd;
            background-color: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }

        .tag-importance button.active-unwichtig {
            background-color: #d1fae5;
            border-color: #10b981;
            color: #10b981;
        }

        .tag-importance button.active-ja {
            background-color: #dbeafe;
            border-color: #3b82f6;
            color: #3b82f6;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
        }

        .save-button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }

        .save-button:hover {
            opacity: 0.9;
        }

        .image-uploader {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-icon {
            font-size: 30px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-circle">K</div>
                <div class="logo-text">Kolam Culture</div>
            </div>
            <div class="header-icons">
                <div class="header-icon active">👤</div>
                <div class="header-icon messages">💬</div>
                <div class="header-icon likes">❤️</div>
            </div>
        </header>

        <div class="tabs">
            <div class="tab"><a href="index.html" style="text-decoration: none; color: inherit;">Swipe</a></div>
            <div class="tab active">Profil</div>
            <div class="tab">Matches</div>
            <div class="tab">Einstellungen</div>
        </div>

        <div class="form-container">
            <h2 class="section-title">Profil bearbeiten</h2>

            <div class="form-group" style="display: flex; flex-direction: column; align-items: center;">
                <div class="image-uploader">
                    <img src="/api/placeholder/120/120" alt="Profilbild" class="profile-image">
                </div>
                <button
                    style="background-color: #eee; border: none; padding: 8px 15px; border-radius: 20px; font-size: 14px;">Foto
                    ändern</button>
            </div>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" class="input-field" value="Ravi">
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="age">Alter</label>
                        <input type="number" id="age" class="input-field" value="35">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label for="location">Ort</label>
                        <input type="text" id="location" class="input-field" value="München">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Meine Tags</label>
                <div class="tag-options">
                    <div class="tag">
                        <div class="tag-icon tag-hindu">🕉️</div>
                        <div class="tag-label">Hindu</div>
                        <div class="tag-importance">
                            <button>Unwichtig</button>
                            <button class="active-ja">Ja</button>
                        </div>
                    </div>
                    <div class="tag">
                        <div class="tag-icon tag-berater">💼</div>
                        <div class="tag-label">IT-Berater</div>
                        <div class="tag-importance">
                            <button>Unwichtig</button>
                            <button class="active-ja">Ja</button>
                        </div>
                    </div>
                    <div class="tag">
                        <div class="tag-icon tag-kaste">👥</div>
                        <div class="tag-label">Kaste</div>
                        <div class="tag-importance">
                            <button class="active-unwichtig">Unwichtig</button>
                            <button>Ja</button>
                        </div>
                    </div>
                    <div class="tag">
                        <div class="tag-icon tag-kinder">🙂</div>
                        <div class="tag-label">Kinderwunsch</div>
                        <div class="tag-importance">
                            <button>Unwichtig</button>
                            <button class="active-ja">Ja</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Bildung</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="education-1" name="education" checked>
                        <label for="education-1">Studium</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="education-2" name="education">
                        <label for="education-2">Ausbildung</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="education-3" name="education">
                        <label for="education-3">Schule</label>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="height">Körpergröße</label>
                        <input type="text" id="height" class="input-field" value="1,78 m">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>Raucher</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="smoker-yes" name="smoker">
                                <label for="smoker-yes">Ja</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="smoker-no" name="smoker" checked>
                                <label for="smoker-no">Nein</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label>Alkohol</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="alcohol-yes" name="alcohol">
                                <label for="alcohol-yes">Ja</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="alcohol-no" name="alcohol" checked>
                                <label for="alcohol-no">Nein</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>Kinderwunsch</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="kids-yes" name="kids" checked>
                                <label for="kids-yes">Ja</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="kids-no" name="kids">
                                <label for="kids-no">Nein</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="about">Über mich</label>
                <textarea
                    id="about">Ich bin ein ruhiger, nachdenklicher Typ aus Hamburg. Ich arbeite als Ingenieur und genieße Wandern, Lesen und gutes Essen. Ich suche eine ernsthafte Beziehung mit gemeinsamen kulturellen Werten und Traditionen.</textarea>
            </div>

            <div class="form-group">
                <label for="looking">Was ich suche</label>
                <textarea
                    id="looking">Eine Partnerin, die familiäre Werte schätzt und mit der ich eine Zukunft aufbauen kann. Gemeinsame religiöse und kulturelle Werte sind mir sehr wichtig.</textarea>
            </div>

            <button class="save-button">Profil speichern</button>
        </div>
    </div>
</body>

</html>
